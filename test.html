<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Section</title>
    <style>
        html, body {
            height: 100%;
            background-image: url('css/achtergrond.png');
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        html {
            scroll-behavior: smooth;
        }

        #skills {
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            font-family: 'Arial', sans-serif;
        }

        #skills h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #skills h2::before {
            content: "⟡";
            color: #e028a2;
            margin-right: 10px;
            font-size: 2.5rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(224, 40, 162, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .skill-card:hover::before {
            left: 100%;
        }

        .skill-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(224, 40, 162, 0.3);
            border-color: #e028a2;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .skill-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .skill-percentage {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e028a2;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(45deg, #e028a2, #ff6b9d, #e028a2);
            background-size: 200% 200%;
            border-radius: 8px;
            width: 0%;
            transition: width 2s ease-in-out;
            animation: shimmer 3s ease-in-out infinite;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: slide 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .skill-card.animate .progress-bar {
            animation-play-state: running;
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            #skills {
                max-width: 900px;
                padding: 35px 18px;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 18px;
            }
        }

        @media (max-width: 992px) {
            #skills {
                max-width: 750px;
                padding: 30px 16px;
            }
            
            #skills h2 {
                font-size: 2rem;
            }
            
            #skills h2::before {
                font-size: 2.2rem;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            #skills {
                padding: 25px 15px;
                max-width: 100%;
            }
            
            #skills h2 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }
            
            #skills h2::before {
                font-size: 2rem;
                margin-right: 8px;
            }
            
            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 15px;
            }
            
            .skill-card {
                padding: 18px;
                border-radius: 12px;
            }
            
            .skill-card:hover {
                transform: translateY(-5px);
            }
            
            .skill-name {
                font-size: 1.1rem;
            }
            
            .skill-percentage {
                font-size: 1rem;
            }
        }

        /* Improved styles for small phones (576px and below) */
        @media (max-width: 576px) {
            #skills {
                padding: 25px 15px; /* Increased padding */
            }
            
            #skills h2 {
                font-size: 1.9rem; /* Larger title */
                margin-bottom: 25px;
            }
            
            #skills h2::before {
                font-size: 2.1rem; /* Larger icon */
                margin-right: 8px;
            }
            
            .skills-grid {
                grid-template-columns: 1fr; /* Single column for better readability */
                gap: 18px; /* Increased gap */
            }
            
            .skill-card {
                padding: 20px; /* Increased padding */
                border-radius: 12px;
                min-height: 80px; /* Minimum height for touch targets */
            }
            
            .skill-header {
                margin-bottom: 15px;
            }
            
            .skill-name {
                font-size: 1.15rem; /* Larger text */
            }
            
            .skill-percentage {
                font-size: 1.05rem; /* Larger percentage */
            }
            
            .progress-container {
                height: 10px; /* Thicker progress bar */
            }
            
            .progress-bar {
                border-radius: 10px;
            }
        }

        /* Enhanced styles for very small phones (480px and below) */
        @media (max-width: 480px) {
            #skills {
                padding: 25px 15px; /* Maintained generous padding */
            }
            
            #skills h2 {
                font-size: 1.8rem; /* Still large and readable */
                margin-bottom: 25px;
            }
            
            #skills h2::before {
                font-size: 2rem;
                margin-right: 8px;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .skill-card {
                padding: 18px; /* Good padding for touch interaction */
                min-height: 75px;
            }
            
            .skill-name {
                font-size: 1.1rem; /* Readable text size */
            }
            
            .skill-percentage {
                font-size: 1rem;
            }
            
            .progress-container {
                height: 8px; /* Good visibility */
            }
        }

        /* Optimized styles for extra small phones (360px and below) */
        @media (max-width: 360px) {
            #skills {
                padding: 20px 12px; /* Adequate padding */
            }
            
            #skills h2 {
                font-size: 1.7rem; /* Large enough to read easily */
                margin-bottom: 20px;
            }
            
            #skills h2::before {
                font-size: 1.9rem;
                margin-right: 6px;
            }
            
            .skill-card {
                padding: 16px; /* Good touch target size */
                min-height: 70px;
            }
            
            .skill-name {
                font-size: 1.05rem; /* Maintained readability */
            }
            
            .skill-percentage {
                font-size: 0.95rem;
            }
            
            .progress-container {
                height: 8px; /* Maintained thickness for visibility */
            }
            
            .progress-bar {
                border-radius: 8px;
            }
        }

        /* Touch-friendly improvements for all small screens */
        @media (max-width: 576px) {
            .skill-card {
                cursor: pointer;
                transition: all 0.2s ease;
            }
            
            .skill-card:active {
                transform: scale(0.98);
                box-shadow: 0 5px 15px rgba(224, 40, 162, 0.2);
            }
            
            /* Ensure text remains sharp and readable */
            .skill-name,
            .skill-percentage {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
        }
    </style>
</head>


    <script>
        const observerOptions = {
            threshold: 0.3,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const progressBar = card.querySelector('.progress-bar');
                    const skillLevel = card.getAttribute('data-skill');
                    
                    // Add animation class
                    card.classList.add('animate');
                    
                    // Animate progress bar
                    setTimeout(() => {
                        progressBar.style.width = skillLevel + '%';
                    }, 200);
                }
            });
        }, observerOptions);

        // Observe all skill cards
        document.querySelectorAll('.skill-card').forEach(card => {
            observer.observe(card);
        });

        // Add stagger effect to cards
        document.querySelectorAll('.skill-card').forEach((card, index) => {
            card.style.animationDelay = `${index * 0.1}s`;
        });
    </script>
</body>
</html>
